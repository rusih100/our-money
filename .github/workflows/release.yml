name: release

# Сборка и публикация релиза при пуше тега вида v1.2.3.
# tauri-action сам соберёт фронтенд + Tauri и создаст GitHub Release,
# прикрепив Windows-инсталляторы (NSIS .exe и WiX .msi).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Our Money ${{ github.ref_name }}"
          releaseBody: "Сборки прикреплены ниже. История изменений — в CHANGELOG.md."
          releaseDraft: false
          prerelease: false
